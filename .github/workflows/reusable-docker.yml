name: reusable-docker

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string
    secrets:
      docker_username:
        required: true
      docker_token:
        required: true
    outputs:
      image_url:
        value: ${{ jobs.docker.outputs.image }}

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.docker_token }}" | docker login -u "${{ secrets.docker_username }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ inputs.image_name }}:${{ inputs.tag }} .

      - name: Push image
        run: docker push ${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Set output
        id: set
        run: echo "image=${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
