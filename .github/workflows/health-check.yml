name: Health Check

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Pull image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Run container
        run: docker run -d -p 5000:5000 --name test-app ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Wait
        run: sleep 5

      - name: Check health
        run: |
          response=$(curl -s http://localhost:5000/health)
          echo $response
          if [[ $response == *"ok"* ]]; then
            echo "PASSED"
          else
            exit 1
          fi

      - name: Cleanup
        run: docker rm -f test-app

      - name: Summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: flask-app:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY
